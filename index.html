<!DOCTYPE html>
<html lang="nl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Het Verzet in Overijssel - PO Geschiedenis</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #0f0f11; color: #e0e0e0; overflow-x: hidden; }
        h1, h2, h3, .museum-font { font-family: 'Playfair Display', serif; }
        
        /* Design kaarten */
        .glass-card {
            background: rgba(26, 26, 28, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201, 162, 99, 0.1);
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            border-color: rgba(201, 162, 99, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(-5px);
        }
        
        .accent-color { color: #d4af37; }
        .accent-bg { background-color: #d4af37; }
        
        /* Foto's vergroten */
        .zoomable-img {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: zoom-in;
        }
        .zoomable-img:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        /* Presentatie Knop */
        .btn-fullscreen {
            background: rgba(15, 15, 17, 0.8);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 12px 30px;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: pulse-glow 2.5s infinite;
        }
        .btn-fullscreen:hover {
            background: #d4af37;
            color: #0f0f11;
            animation: none;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        /* Citaatblok voor conclusie */
        .museum-quote {
            border-left: 4px solid #d4af37;
            background: linear-gradient(90deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            padding: 1.5rem;
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
    </style>
</head>
<body class="antialiased selection:bg-yellow-700 selection:text-white">

<div id="scroll-progress" class="fixed top-0 left-0 h-1 accent-bg z-[60] transition-all duration-150" style="width: 0%;"></div>

<div id="lightbox" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col justify-center items-center opacity-0 transition-opacity duration-300" onclick="closeLightbox()">
    <button class="absolute top-6 right-8 text-[#d4af37] text-5xl hover:text-white transition duration-300">&times;</button>
    <img id="lightbox-img" src="" alt="Vergrote afbeelding" class="max-h-[85vh] max-w-[90vw] object-contain rounded border border-gray-700">
    <p class="text-[#d4af37] mt-6 tracking-widest uppercase text-sm font-bold">Klik om te sluiten</p>
</div>
